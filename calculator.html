<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-калькулятор</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="calculator-container">
        <h1>🧮 Мини-калькулятор</h1>
        <div class="subtitle">Выполните математическое действие</div>
        
        <form action="calculator.php" method="POST">
            <div class="form-group">
                <label>Первое число:</label>
                <input type="number" name="num1" step="any" placeholder="Введите число" required>
            </div>

            <div class="form-group">
                <label>Операция:</label>
                <select name="operation" required>
                    <option value="">Выберите действие</option>
                    <option value="+">➕ Сложение (+)</option>
                    <option value="-">➖ Вычитание (-)</option>
                    <option value="*">✖️ Умножение (*)</option>
                    <option value="/">➗ Деление (/)</option>
                    <option value="%">🔢 Остаток от деления (%)</option>
                    <option value="^">📈 Возведение в степень (^)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Второе число:</label>
                <input type="number" name="num2" step="any" placeholder="Введите число" required>
            </div>

            <button type="submit">🚀 Вычислить</button>
        </form>
    </div>
</body>
</html>
